name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build, for example v1.0.0'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release ref
        id: release_ref
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        env:
          INPUT_TAG: ${{ inputs.tag }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.release_ref.outputs.tag }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run release-local gate
        run: make test-release-local

      - name: Build release assets
        run: make release-all VERSION=${{ steps.release_ref.outputs.tag }}

      - name: Verify release assets
        env:
          RELEASE_TAG: ${{ steps.release_ref.outputs.tag }}
        run: |
          set -euo pipefail
          for target in \
            darwin-amd64.tar.gz \
            darwin-arm64.tar.gz \
            linux-amd64.tar.gz \
            linux-arm64.tar.gz \
            windows-amd64.zip \
            windows-arm64.zip; do
            test -f "dist/cc-connect-${RELEASE_TAG}-${target}"
          done
          test -f dist/checksums.txt
          (cd dist && sha256sum -c checksums.txt)
          "./dist/cc-connect-${RELEASE_TAG}-linux-amd64" --version | grep -F "cc-connect ${RELEASE_TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.release_ref.outputs.tag }}
          name: cc-connect ${{ steps.release_ref.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: true
